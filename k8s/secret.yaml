# k8s/secret.yaml
#
# Create the secret from the command line (preferred — avoids committing tokens):
#
#   kubectl create secret generic cf-radar-secret \
#     --from-literal=CF_API_TOKEN="your-cloudflare-token-here"
#
# Or apply this manifest after base64-encoding the token:
#
#   echo -n "your-cloudflare-token-here" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: cf-radar-secret
  labels:
    app: cf-attacks
type: Opaque
data:
  # Replace with your own base64-encoded token:
  CF_API_TOKEN: "REPLACE_WITH_BASE64_ENCODED_TOKEN"
